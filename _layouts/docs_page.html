---
layout: default
---
<div class="container-fluid">
  <div class="row">
    <nav class="col-md-3 col-lg-2 d-md-block bg-light sidebar collapse" id="docs-sidebar">
      <div class="sidebar-sticky pt-3">
        {% assign sorted_docs = site.docs | sort: 'nav_order' %}
        <ul class="nav flex-column">
          {% for doc in sorted_docs %}
            {% if doc.title and doc.url %}
              <li class="nav-item">
                <a class="nav-link {% if page.url == doc.url %}active{% endif %}" href="{{ doc.url | relative_url }}">
                  {{ doc.title | escape }}
                </a>
              </li>
            {% endif %}
          {% endfor %}
        </ul>
      </div>
    </nav>
    <main role="main" class="col-md-9 ml-sm-auto col-lg-10 px-md-4">
      <div class="pt-3 pb-2 mb-3 border-bottom">
        <h1>{{ page.title | escape }}</h1>
      </div>
      {{ content }}
    </main>
  </div>
</div>
